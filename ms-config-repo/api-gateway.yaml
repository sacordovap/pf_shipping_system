server:
  port: 8080

spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost} # host de Redis
      port: 6379
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: false
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**
        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/api/v1/customers/**
        - id: shipping-service
          uri: lb://SHIPPING-SERVICE
          predicates:
            - Path=/api/v1/shippings/**, /api/v1/categories/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10 # peticiones por segundo
                redis-rate-limiter.burstCapacity: 20 # peticiones acumuladas
                key-resolver: "#{@ipKeyResolver}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoint:
    gateway:
      access: UNRESTRICTED
  endpoints:
    web:
      exposure:
        include: "refresh,health,info,circuitbreakers,metrics"